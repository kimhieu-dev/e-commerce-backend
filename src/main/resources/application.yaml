spring:
  application:
    name: e-commerce-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/default_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
